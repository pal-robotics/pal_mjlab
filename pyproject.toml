[project]
name = "pal-mjlab"
version = "0.1.0"
description = "PAL Robotics' robots in mjlab "
readme = "README.md"
authors = [
    { name = "Louis Le Lay", email = "louislelay@pal-robotics.com" }
]
requires-python = ">=3.10,<3.14"
dependencies = [
    "mjlab>=1.1.1",
]

[build-system]
requires = ["uv_build>=0.8.18,<0.9.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ruff>=0.14.14",
]

[tool.ruff]
indent-width = 2
src = ["pal_mjlab"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B"]

[project.entry-points."mjlab.tasks"]
pal_mjlab = "pal_mjlab.tasks"

[project.scripts]
pal_train = "pal_mjlab.scripts.train:main"

[tool.uv.sources]
mjlab = { git = "https://github.com/pal-robotics-forks/mjlab/", rev = "941b75b6dcf09bd0fbe56e74a6c2bb2a4a28adc7" }
