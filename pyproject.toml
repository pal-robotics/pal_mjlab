[project]
name = "mjlab-kangaroo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Louis Le Lay", email = "louislelay@pal-robotics.com" }
]
requires-python = ">=3.10,<3.14"
dependencies = [
    "mjlab",
    "ruff>=0.14.0",
]

[project.scripts]
mjlab-kangaroo = "mjlab_kangaroo:main"
pal_train = "mjlab_kangaroo.scripts.train:main"
pal_play = "mjlab_kangaroo.scripts.play:main"
pal_list_envs = "mjlab_kangaroo.scripts.list_envs:main"


[build-system]
requires = ["uv_build>=0.8.18,<0.9.0"]
build-backend = "uv_build"

[tool.uv.sources]
mjlab = { git = "https://github.com/mujocolab/mjlab" }

