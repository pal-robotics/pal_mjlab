repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.12.3
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
    - id: ruff
      name: sort imports with ruff
      args: [--select, I, --fix]
    - id: ruff-format
      name: format with ruff
