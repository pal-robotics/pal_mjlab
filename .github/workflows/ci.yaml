name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Makefile'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Makefile'
      - 'LICENSE'

env:
  UV_FROZEN: "1"

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.9.27"
      - name: Run lint
        run: uvx ruff@0.14.14 check --diff
      - name: Run format
        run: uvx ruff@0.14.14 format --diff
      - name: Check pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  tests:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          python-version: ["3.10", "3.11", "3.12", "3.13"]
      steps:
        - uses: actions/checkout@v6
        - name: Setup uv
          uses: astral-sh/setup-uv@v7
          with:
            python-version: ${{ matrix.python-version }}
            enable-cache: true
            version: "0.9.27"
        - name: Restore Warp kernel cache
          uses: actions/cache@v4
          with:
            path: ~/.cache/warp
            key: warp-kernels-${{ runner.os }}-${{ runner.arch }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock', 'mjlab/**/*.py') }}
            restore-keys: |
              warp-kernels-${{ runner.os }}-${{ runner.arch }}-${{ matrix.python-version }}-
        - name: Test with python ${{ matrix.python-version }}
          run: uv run --extra cpu pytest

